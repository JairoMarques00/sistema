<!DOCTYPE html>
<html lang="pt-BR">
<!--
  Página para editar/excluir pacientes já cadastrados.
  Atualiza os dados via API REST (Flask + SQLite).
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Edição de Pacientes</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body data-page="lista-pacientes">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-4">
              <div>
                <h2 class="h4 mb-1">Edição de pacientes</h2>
                <p class="text-muted mb-0">Atualize ou remova pacientes existentes.</p>
              </div>
              <span class="badge bg-warning text-dark">Gerenciar</span>
            </div>

            <div id="patientsListAlert"></div>

            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>E‑mail</th>
                    <th class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody id="patientsListTable"></tbody>
              </table>
            </div>

            <hr class="my-5" />

            <h3 class="h5 mb-3">Editar paciente</h3>
            <form id="editPatientForm" class="row g-3">
              <input type="hidden" id="editingId" />
              <div class="col-md-6">
                <label class="form-label" for="editNome">Nome</label>
                <input class="form-control" id="editNome" name="nome" required />
              </div>
              <div class="col-md-2">
                <label class="form-label" for="editIdade">Idade</label>
                <input class="form-control" id="editIdade" name="idade" type="number" min="0" />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="editEscola">Escola</label>
                <input class="form-control" id="editEscola" name="escola" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="editResponsavel">Responsável</label>
                <input class="form-control" id="editResponsavel" name="responsavel" />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="editTelefone">Telefone</label>
                <input class="form-control" id="editTelefone" name="telefone" />
              </div>
              <div class="col-md-2">
                <label class="form-label" for="editEmail">E‑mail</label>
                <input class="form-control" id="editEmail" name="email" type="email" />
              </div>
              <div class="col-12">
                <label class="form-label" for="editObservacoes">Observações</label>
                <textarea class="form-control" id="editObservacoes" name="observacoes" rows="3"></textarea>
              </div>
              <div class="col-12 text-end">
                <button type="reset" class="btn btn-outline-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar alterações</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
