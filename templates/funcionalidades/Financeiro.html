<!DOCTYPE html>
<html lang="pt-BR">
<!--
  Página de financeiro.
  Registra pagamentos e mostra um resumo de status.
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body data-page="financeiro">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-4">
              <div>
                <h2 class="h4 mb-1">Financeiro</h2>
                <p class="text-muted mb-0">Controle pagamentos e acompanhe receita.</p>
              </div>
              <span class="badge bg-success">Financeiro</span>
            </div>

            <div id="financeAlert"></div>

            <form id="financeForm" class="row g-3 mb-4">
              <div class="col-md-4">
                <label class="form-label" for="financePatientId">Paciente</label>
                <select class="form-select" id="financePatientId" name="patientId" required>
                  <option value="">Selecione um paciente</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label" for="financeDate">Data</label>
                <input class="form-control" id="financeDate" name="date" type="date" required />
              </div>
              <div class="col-md-2">
                <label class="form-label" for="financeValue">Valor (R$)</label>
                <input class="form-control" id="financeValue" name="value" type="number" min="0" step="0.01" required />
              </div>
              <div class="col-md-3">
                <label class="form-label" for="financeStatus">Status</label>
                <select class="form-select" id="financeStatus" name="status" required>
                  <option value="pendente">Pendente</option>
                  <option value="pago">Pago</option>
                  <option value="atrasado">Atrasado</option>
                </select>
              </div>
              <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary">Registrar pagamento</button>
              </div>
            </form>

            <h3 class="h5 mb-3">Movimentações</h3>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Paciente</th>
                    <th>Data</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody id="financeTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
