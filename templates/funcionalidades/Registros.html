<!DOCTYPE html>
<html lang="pt-BR">
<!--
  Página de registros que mostra o histórico de agendamentos.
  Os dados são carregados via API REST (Flask + SQLite).
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registros</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<div class="card mb-4">
<div class="card-body">

<h4>Novo Registro</h4>

<form id="registroForm">

<div class="row">

<div class="col-md-4">
<label>Paciente</label>
<select id="registroPaciente" class="form-select"></select>
</div>

<div class="col-md-3">
<label>Data</label>
<input type="date" id="registroData" class="form-control">
</div>

<div class="col-md-2">
<label>Hora</label>
<input type="time" id="registroHora" class="form-control">
</div>

</div>

<div class="mt-3">
<label>Observações</label>
<textarea id="registroObs" class="form-control"></textarea>
</div>

<button class="btn btn-primary mt-3">
Adicionar Registro
</button>

</form>

</div>
</div>
<body data-page="registros">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-4">
              <div>
                <h2 class="h4 mb-1">Registros</h2>
                <p class="text-muted mb-0">Veja o histórico dos agendamentos.</p>
              </div>
              <span class="badge bg-secondary">Histórico</span>
            </div>

            <div id="recordsAlert"></div>

            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Paciente</th>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Motivo</th>
                    <th>Registrado em</th>
                  </tr>
                </thead>
                <tbody id="recordsTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
