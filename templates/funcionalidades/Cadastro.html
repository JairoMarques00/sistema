<!DOCTYPE html>
<html lang="pt-BR">
<!--
  Página de cadastro de pacientes.
  Os dados são enviados para o backend via API REST (Flask + SQLite).
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Pacientes</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body data-page="cadastro">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-4">
              <div>
                <h2 class="h4 mb-1">Cadastro de pacientes</h2>
                <p class="text-muted mb-0">Preencha os dados abaixo para adicionar um novo paciente.</p>
              </div>
              <span class="badge bg-primary">Cadastro</span>
            </div>

            <div id="cadastroAlert"></div>

            <form id="cadastroForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="nome">Nome completo</label>
                <input class="form-control" id="nome" name="nome" required />
              </div>
              <div class="col-md-2">
                <label class="form-label" for="idade">Idade</label>
                <input class="form-control" id="idade" name="idade" type="number" min="0" />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="escola">Escola</label>
                <input class="form-control" id="escola" name="escola" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="responsavel">Responsável</label>
                <input class="form-control" id="responsavel" name="responsavel" />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="telefone">Telefone</label>
                <input class="form-control" id="telefone" name="telefone" type="tel" />
              </div>
              <div class="col-md-2">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" />
              </div>
              <div class="col-12">
                <label class="form-label" for="observacoes">Observações</label>
                <textarea class="form-control" id="observacoes" name="observacoes" rows="3"></textarea>
              </div>

              <div class="col-12 d-flex justify-content-end gap-2">
                <button type="reset" class="btn btn-outline-secondary">Limpar</button>
                <button type="submit" class="btn btn-primary">Salvar paciente</button>
              </div>
            </form>

            <hr class="my-5" />

            <h3 class="h5 mb-3">Pacientes cadastrados</h3>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody id="patientsTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
